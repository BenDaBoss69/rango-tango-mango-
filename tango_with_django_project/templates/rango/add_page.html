<!DOCTYPE html>
<html>
    <head>
        <title>Add Page</title>
    </head>
    <body>
        <h1>Add a Page to {{ category.name }}</h1>
        <form action="{% url 'rango:add_page' category.slug %}" method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <input type="submit" name="submit" value="Add Page" />
        </form>
    </body>
</html>
